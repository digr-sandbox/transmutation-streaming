# GraphQL Sample Schema for Transmutation Testing
type User {
  id: ID!
  username: String!
  email: String!
  profile: Profile
  posts(limit: Int): [Post!]!
}

type Profile {
  bio: String
  avatarUrl: String
}

type Post {
  id: ID!
  title: String!
  content: String!
  author: User!
  createdAt: String!
}

type Query {
  me: User
  user(id: ID!): User
  allUsers: [User!]!
  searchPosts(query: String!): [Post!]!
}

type Mutation {
  createPost(title: String!, content: String!): Post!
  updateProfile(bio: String, avatarUrl: String): Profile!
}

enum Role {
  ADMIN
  USER
  GUEST
}
